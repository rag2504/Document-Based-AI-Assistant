services:
  - type: web
    name: docai-backend
    runtime: python
    region: oregon

    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

    plan: free

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      - key: MODEL_NAME
        value: llama-3.3-70b-versatile

      - key: TOP_K
        value: "5"

      - key: CHUNK_SIZE
        value: "700"

      - key: CHUNK_OVERLAP
        value: "150"

      # Set this to your Vercel frontend URL after deploying, e.g.:
      # https://docai.vercel.app
      # Multiple URLs comma-separated: https://docai.vercel.app,https://docai-preview.vercel.app
      - key: ALLOWED_ORIGINS
        value: "*"

      # Set your real API key in the Render Dashboard (Environment tab)
      - key: GROQ_API_KEY
        sync: false
